name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  GO_VERSION: "1.23"
  VAULT_VERSION: "1.19.5"

jobs:
  test:
    name: Test and smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Check formatting
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "$files"
            exit 1
          fi

      - name: Check modules are tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test -race -cover ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

      - name: Build plugin
        run: make build

      - name: Install Vault
        run: |
          # Extract to a temp dir: the repo has a vault/ directory, which would
          # collide with the unzipped `vault` binary in the workspace root.
          curl -fsSLo /tmp/vault.zip "https://releases.hashicorp.com/vault/${VAULT_VERSION}/vault_${VAULT_VERSION}_linux_amd64.zip"
          unzip -o -q /tmp/vault.zip -d /tmp/vaultbin
          sudo install /tmp/vaultbin/vault /usr/local/bin/vault
          vault version

      - name: Vault dev smoke
        run: make vault-smoke

      - name: GoReleaser config check
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: check
